name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy homeassistant

      - name: Run Ruff
        run: ruff check custom_components/

      - name: Run Ruff Format Check
        run: ruff format --check custom_components/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and activate Yarn 4.12.0
        run: |
          corepack enable || true
          PM=""
          if [ -f frontend/package.json ]; then
            PM=$(node -e "console.log(require('./frontend/package.json').packageManager || '')") || true
          elif [ -f frontend_vue/package.json ]; then
            PM=$(node -e "console.log(require('./frontend_vue/package.json').packageManager || '')") || true
          fi
          if [ -n "$PM" ]; then
            echo "Activating package manager: $PM"
            corepack prepare "$PM" --activate || true
          else
            echo "No packageManager found in frontend package.json; skipping corepack prepare"
          fi
          yarn -v || true

      - name: Install dependencies
        working-directory: frontend
        run: yarn install

      - name: Type check
        working-directory: frontend
        run: yarn type-check

      - name: Build
        working-directory: frontend
        run: yarn build

  hacs-validate:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  hassfest:
    name: Hassfest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

