name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and activate Yarn 4.12.0
        run: |
          corepack enable || true
          # Prefer packageManager defined in frontend/package.json or frontend_vue/package.json
          PM=""
          if [ -f frontend/package.json ]; then
            PM=$(node -e "console.log(require('./frontend/package.json').packageManager || '')") || true
          elif [ -f frontend_vue/package.json ]; then
            PM=$(node -e "console.log(require('./frontend_vue/package.json').packageManager || '')") || true
          fi
          if [ -n "$PM" ]; then
            echo "Activating package manager: $PM"
            corepack prepare "$PM" --activate || true
          else
            echo "No packageManager found in frontend package.json; skipping corepack prepare"
          fi
          # Print yarn version for diagnostics (may be from corepack)
          yarn -v || true

      - name: Install dependencies
        working-directory: frontend
        run: yarn install

      - name: Build frontend
        working-directory: frontend
        run: yarn build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: custom_components/plugin_template/www/plugin-template-card.js

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: custom_components/plugin_template/www/

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.version }}"/' custom_components/plugin_template/manifest.json

      - name: Create release zip
        run: |
          # HACS expects zip contents to be extracted directly into custom_components/plugin_template/
          # So we zip the contents, not the folder itself
          cd custom_components/plugin_template
          zip -r ../../plugin-template.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: plugin-template.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  hacs-validate:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands
